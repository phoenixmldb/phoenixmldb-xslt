name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Determine version from git tags
        id: version
        run: |
          # Use latest tag as base version; append commit count since tag for pre-release builds
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          BASE_VERSION="${LATEST_TAG#v}"
          COMMITS_SINCE=$(git rev-list --count "${LATEST_TAG}..HEAD" 2>/dev/null || git rev-list --count HEAD)
          if [ "$COMMITS_SINCE" = "0" ]; then
            VERSION="$BASE_VERSION"
          else
            VERSION="${BASE_VERSION}.${COMMITS_SINCE}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION} (tag: ${LATEST_TAG}, +${COMMITS_SINCE} commits)"

      - name: Restore
        run: |
          dotnet restore src/PhoenixmlDb.Xslt
          dotnet restore src/PhoenixmlDb.Xslt.Cli

      - name: Build
        env:
          BUILD_VERSION: ${{ steps.version.outputs.version }}
        run: |
          dotnet build src/PhoenixmlDb.Xslt -c Release --no-restore -p:Version="$BUILD_VERSION"
          dotnet build src/PhoenixmlDb.Xslt.Cli -c Release --no-restore -p:Version="$BUILD_VERSION"

      - name: Pack
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          PKG_VERSION: ${{ steps.version.outputs.version }}
        run: |
          dotnet pack src/PhoenixmlDb.Xslt -c Release --no-build \
            -p:PackageVersion="$PKG_VERSION" -o ./artifacts
          dotnet pack src/PhoenixmlDb.Xslt.Cli -c Release --no-build \
            -p:PackageVersion="$PKG_VERSION" -o ./artifacts

      - name: Upload artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ./artifacts/*.nupkg

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: ./artifacts

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Login to NuGet via trusted publisher
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: endpointsystems

      - name: Push to NuGet
        env:
          NUGET_KEY: ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
        run: |
          for pkg in ./artifacts/*.nupkg; do
            dotnet nuget push "$pkg" \
              --api-key "$NUGET_KEY" \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          done
